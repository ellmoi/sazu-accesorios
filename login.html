<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Iniciar sesión | Sazu</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="auth">
      <section class="auth-info">
        <a class="brand" href="index.html">SAZU <span>ACCESORIOS</span></a
        ><span class="eyebrow" style="color: #70d2c9; margin-top: 70px"
          >Tu cuenta Sazu</span
        >
        <h1 class="page-title">Vuelve a descubrir lo que te gusta.</h1>
        <p>Consulta pedidos, guarda favoritos y accede a beneficios.</p>
        <a
          class="btn btn-outline"
          style="width: max-content; background: transparent; color: #fff"
          href="index.html"
          >← Volver a la tienda</a
        >
      </section>
      <section class="auth-main">
        <form class="form-card" id="loginForm">
          <span class="eyebrow">Bienvenido</span>
          <h2>Iniciar sesión</h2>
          <p>Usa cualquier correo y una contraseña de seis caracteres.</p>
          <div class="field">
            <label>Correo</label><input id="loginEmail" type="email" required />
          </div>
          <div class="field">
            <label>Contraseña</label
            ><input id="loginPassword" type="password" minlength="6" required />
          </div>
          <button class="btn btn-primary" style="width: 100%">Ingresar</button>
          <p style="text-align: center">
            ¿No tienes cuenta?
            <a
              href="registro.html"
              style="color: var(--brand); font-weight: 900"
              >Regístrate</a
            >
          </p>
          <button
            type="button"
            class="btn btn-outline"
            style="width: 100%"
            data-demo
          >
            Recuperar contraseña
          </button>
        </form>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="js/app.js"></script>
  </body>
</html>
